<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Horários - Studio PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* BASE */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #f4f6f8;
            color: #1f2937;
        }

        /* CONTAINER */
        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 20px;
        }

        /* CARD */
        .card {
            background: #ffffff;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            transition: 0.3s;
        }

            .card:hover {
                box-shadow: 0 10px 30px rgba(0,0,0,0.12);
            }

            .card h2 {
                text-align: center;
                margin-bottom: 30px;
                font-size: 1.9rem;
                font-weight: 600;
                color: #111827;
            }

        /* TABELA */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 14px;
            text-align: center;
        }

        th {
            background: #e5e7eb;
            font-weight: 600;
            color: #111827;
            border-bottom: 2px solid #d1d5db;
        }

        tr:nth-child(even) {
            background: #f9fafb;
        }

        tr:hover {
            background: #f1f5f9;
        }

        /* BADGES DE STATUS */
        .badge {
            padding: 5px 12px;
            border-radius: 12px;
            color: white;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-block;
        }

            .badge.ativo {
                background: #22c55e;
            }
            /* verde */
            .badge.inativo {
                background: #9ca3af;
            }
        /* cinza */

        /* INPUTS */
        input[type="time"] {
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            background: #f9fafb;
            transition: 0.3s;
        }

            input[type="time"]:focus {
                border-color: #3b82f6;
                background: #ffffff;
            }

        /* CHECKBOX */
        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        /* BOTÃO */
        button {
            padding: 12px 30px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: block;
            margin: 25px auto 0;
        }

            button:hover {
                background: #2563eb;
            }

        /* RESPONSIVO */
        @media (max-width:768px) {
            .container {
                padding: 15px;
            }

            table, th, td {
                font-size: 0.9rem;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <h2>Configurar Horários</h2>

            <form method="POST">

                <table>
                    <tr>
                        <th>Dia</th>
                        <th>Início</th>
                        <th>Fim</th>
                        <th>Status</th>
                        <th>Ativo</th>
                    </tr>

                    {% for h in horarios %}
                    <tr>
                        <td>{{ dias[h.dia_semana] }}</td>

                        <td>
                            <input type="time" name="inicio_{{ h.id }}" value="{{ h.inicio }}">
                        </td>

                        <td>
                            <input type="time" name="fim_{{ h.id }}" value="{{ h.fim }}">
                        </td>

                        <td>
                            {% if h.ativo %}
                            <span class="badge ativo">Ativo</span>
                            {% else %}
                            <span class="badge inativo">Inativo</span>
                            {% endif %}
                        </td>

                        <td>
                            <input type="checkbox" name="ativo_{{ h.id }}" {% if h.ativo %}checked{% endif %}>
                        </td>
                    </tr>
                    {% endfor %}
                </table>

                <button type="submit">💾 Salvar Alterações</button>

            </form>

        </div>
    </div>

</body>
</html>
