<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marina Laia Beauty</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins',sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #E6E6FA, #C8A2FF, #9F7AEA);
            display: flex;
            justify-content: center;
            align-items: center; /* 🔥 CENTRALIZADO NA TELA */
            padding: 15px;
        }

        /* SPLASH */
        #splash {
            position: fixed;
            width: 100%;
            height: 100%;
            background: #C8A2FF;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            animation: fadeOut 1s ease 2s forwards;
        }

            #splash img {
                width: 60%;
                max-width: 260px;
                border-radius: 20px;
                animation: zoom 1.2s ease;
            }

        @keyframes zoom {
            from {
                transform: scale(0.7);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                visibility: hidden;
            }
        }

        #particles {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 420px;
            padding: 30px 20px;
            border-radius: 24px;
            background: rgba(255,255,255,0.18);
            backdrop-filter: blur(25px);
            text-align: center;
            color: white;
            box-shadow: 0 20px 50px rgba(0,0,0,0.25);
            animation: slideUp 0.9s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin-bottom: 15px;
            border: 3px solid white;
        }

        h1 {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 13px;
            margin-bottom: 25px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            margin: 10px 0;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: 0.3s;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-roxo {
            background: #6A0DAD;
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:active {
            transform: scale(0.97);
        }

        .map {
            margin-top: 20px;
            border-radius: 14px;
            overflow: hidden;
        }

            .map iframe {
                height: 150px;
                width: 100%;
            }

        .admin-float {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 48px;
            height: 48px;
            background: #6A0DAD;
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            text-decoration: none;
            box-shadow: 0 6px 18px rgba(0,0,0,0.3);
            z-index: 3;
        }

        /* MOBILE */
        @media(max-width: 480px) {
            .container {
                padding: 25px 15px;
            }

            h1 {
                font-size: 20px;
            }

            .logo {
                width: 85px;
                height: 85px;
            }
        }
    </style>
</head>

<body>

    <!-- SPLASH -->
    <div id="splash">
        <img src="{{ url_for('static', filename='splash.jpg') }}">
    </div>

    <div id="particles"></div>

    <div class="container">

        <img src="{{ url_for('static', filename='logo.jpg') }}" class="logo">

        <h1>Marina Laia Beauty</h1>
        <p class="subtitle">Especialista em cílios, sobrancelhas e maquiagem</p>

        <a class="btn btn-roxo" href="/agendar">💄 Agendar Horário</a>

        <a class="btn btn-roxo"
           href="https://wa.me/553299781559?text=Olá,%20quero%20ver%20o%20catálogo%20de%20procedimentos">
            📋 Catálogo de Procedimentos
        </a>

        <a class="btn btn-roxo"
           href="https://wa.me/553299781559?text=Olá,%20quero%20saber%20mais%20sobre%20os%20cursos">
            🎓 Saber mais sobre os cursos
        </a>

        <div class="map">
            <iframe src="https://www.google.com/maps?q=Rua+Josias+Martins+Nogueira+120+Visconde+do+Rio+Branco+MG&output=embed"></iframe>
        </div>

        <a class="btn btn-roxo" target="_blank"
           href="https://www.google.com/maps/dir/?api=1&destination=Rua+Josias+Martins+Nogueira+120+Visconde+do+Rio+Branco+MG">
            📍 Como Chegar
        </a>

    </div>

    <a href="{{ url_for('login') }}" class="admin-float">🔑</a>

    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

    <script>
tsParticles.load("particles", {
    particles: {
        number: { value: 40 },
        color: { value: ["#ffffff", "#f3e8ff", "#e6ccff"] },
        opacity: { value: 0.3 },
        size: { value: { min: 2, max: 5 } },
        move: { enable: true, speed: 0.5 }
    }
});
    </script>

</body>
</html>
