<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Editar Registro - Financeiro PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* RESET E BASE */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg,#0f172a,#1e293b);
        }

        /* CONTAINER GLASS */
        .container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            padding: 40px 35px;
            border-radius: 25px;
            width: 420px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            color: #fff;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

            .container:hover {
                transform: translateY(-5px);
                box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            }

        /* TITULO */
        h2 {
            text-align: center;
            font-weight: 600;
            font-size: 1.8rem;
            margin-bottom: 30px;
            letter-spacing: 1px;
            color: #22c55e;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        /* INPUTS */
        input, select {
            width: 100%;
            padding: 14px;
            margin-bottom: 20px;
            border-radius: 12px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.15);
            color: white;
            font-size: 1rem;
            transition: background 0.3s ease, transform 0.2s ease;
        }

            input::placeholder {
                color: #ddd;
            }

            input:focus, select:focus {
                background: rgba(255,255,255,0.25);
                transform: scale(1.02);
            }

        /* BOTÕES */
        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .btn-save {
            background: linear-gradient(90deg, #22c55e, #16a34a);
            color: white;
            box-shadow: 0 5px 15px rgba(34,197,94,0.4);
        }

            .btn-save:hover {
                background: linear-gradient(90deg, #16a34a, #22c55e);
                transform: translateY(-2px);
                box-shadow: 0 10px 20px rgba(34,197,94,0.6);
            }

        .btn-back {
            margin-top: 15px;
            display: block;
            text-align: center;
            text-decoration: none;
            background: linear-gradient(90deg, #64748b, #475569);
            color: white;
            padding: 12px;
            border-radius: 12px;
            transition: 0.3s ease;
        }

            .btn-back:hover {
                background: linear-gradient(90deg, #475569, #64748b);
                transform: translateY(-2px);
            }
    </style>
</head>
<body>
    <div class="container">
        <h2>✏️ Editar Registro</h2>
        <form method="POST">
            <input type="text" name="descricao" value="{{ r.descricao }}" placeholder="Descrição" required>
            <input type="number" step="0.01" name="valor" value="{{ r.valor }}" placeholder="Valor" required>

            <select name="tipo" required>
                <option value="Entrada" selected="{{ 'selected' if r.tipo == 'Entrada' else '' }}">Entrada</option>
                <option value="Saida" selected="{{ 'selected' if r.tipo == 'Saida' else '' }}">Saída</option>
            </select>

            <button type="submit" class="btn btn-save">💾 Salvar Alterações</button>
        </form>

        <a href="/admin/financeiro" class="btn-back">⬅ Voltar</a>
    </div>
</body>
</html>
