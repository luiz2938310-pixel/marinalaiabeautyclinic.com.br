<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Editar Estoque</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins',sans-serif;
            background: linear-gradient(135deg,#0f172a,#1e293b);
            color: white;
            padding: 30px;
        }

        .content {
            max-width: 600px;
            margin: auto;
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #3b82f6;
        }

        .card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input {
            padding: 12px 15px;
            border-radius: 8px;
            border: none;
            outline: none;
            font-size: 14px;
        }

        input:focus {
            box-shadow: 0 0 0 3px rgba(59,130,246,0.5);
        }

        button {
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: #3b82f6;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: .3s;
            font-size: 16px;
        }

        button:hover {
            background: #2563eb;
        }

        .btn-cancel {
            background: #ef4444;
            text-align: center;
            line-height: 38px;
            text-decoration: none;
            display: inline-block;
            padding: 12px;
            border-radius: 10px;
            color: white;
        }

        .btn-cancel:hover {
            background: #dc2626;
        }

        .row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .row input {
            flex: 1;
        }
    </style>
</head>

<body>
    <div class="content">
        <h2>✏ Editar Produto</h2>

        <div class="card">

            <!-- 🔥 FORM CORRIGIDO -->
            <form method="POST" action="{{ url_for('editar_produto', id=produto.id) }}">

                <input type="text" name="nome" placeholder="Nome do Produto" value="{{ produto.nome }}" required>

                <div class="row">
                    <input type="number" name="quantidade" placeholder="Quantidade" value="{{ produto.quantidade }}" required>
                    <input type="number" name="minimo" placeholder="Estoque Mínimo" value="{{ produto.minimo }}">
                </div>

                <input type="number" step="0.01" name="custo" placeholder="Custo" value="{{ produto.custo }}">

                <div class="row">
                    <button type="submit">💾 Salvar Alterações</button>

                    <!-- 🔥 BOTÃO VOLTAR MELHORADO -->
                    <a href="{{ url_for('admin_estoque') }}" class="btn-cancel">⬅ Voltar</a>
                </div>

            </form>

        </div>
    </div>
</body>
</html>
