<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Editar Produto</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#020617,#0f172a);
    color:#fff;
    padding:30px;
}

/* CONTAINER */
.content{
    max-width:650px;
    margin:auto;
}

/* TÍTULO */
h2{
    text-align:center;
    margin-bottom:25px;
    font-size:26px;
}

/* CARD */
.card{
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(12px);
    padding:30px;
    border-radius:18px;
    box-shadow:0 15px 40px rgba(0,0,0,0.4);
}

/* FORM */
form{
    display:flex;
    flex-direction:column;
    gap:15px;
}

label{
    font-size:13px;
    opacity:.7;
}

/* INPUTS */
input{
    padding:13px 15px;
    border-radius:10px;
    border:none;
    outline:none;
    background:#0f172a;
    color:#fff;
    font-size:14px;
    transition:.3s;
}

input:focus{
    box-shadow:0 0 0 2px #6366f1;
    transform:scale(1.02);
}

/* LINHA */
.row{
    display:flex;
    gap:15px;
}

/* BOTÕES */
.actions{
    display:flex;
    gap:10px;
    margin-top:10px;
}

button{
    flex:1;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#6366f1;
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 5px 20px rgba(99,102,241,0.4);
}

/* VOLTAR */
.btn-cancel{
    flex:1;
    text-align:center;
    padding:14px;
    border-radius:12px;
    background:#ef4444;
    text-decoration:none;
    color:white;
    font-weight:bold;
    transition:.3s;
}

.btn-cancel:hover{
    transform:translateY(-2px);
    box-shadow:0 5px 20px rgba(239,68,68,0.4);
}

/* ALERTA */
.alert{
    background:#22c55e;
    padding:10px;
    border-radius:8px;
    margin-bottom:10px;
    text-align:center;
}
</style>
</head>

<body>

<div class="content">

    <h2>✏ Editar Produto</h2>

    <!-- MENSAGENS -->
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        {% for category, message in messages %}
        <div class="alert">{{ message }}</div>
        {% endfor %}
    {% endif %}
    {% endwith %}

    <div class="card">

        <!-- 🔥 CORRIGIDO AQUI -->
        <form method="POST" action="{{ url_for('editar_estoque_v2', id=produto.id) }}">

            <div>
                <label>Nome do Produto</label>
                <input type="text" name="nome" value="{{ produto.nome }}" required>
            </div>

            <div class="row">
                <div style="flex:1;">
                    <label>Quantidade</label>
                    <input type="number" name="quantidade" value="{{ produto.quantidade }}" required>
                </div>

                <div style="flex:1;">
                    <label>Mínimo</label>
                    <input type="number" name="minimo" value="{{ produto.minimo }}">
                </div>
            </div>

            <div>
                <label>Custo (R$)</label>
                <input type="number" step="0.01" name="custo" value="{{ produto.custo }}">
            </div>

            <div class="actions">
                <button type="submit">💾 Salvar Alterações</button>
                <a href="{{ url_for('admin_estoque') }}" class="btn-cancel">⬅ Voltar</a>
            </div>

        </form>

    </div>

</div>

</body>
</html>
