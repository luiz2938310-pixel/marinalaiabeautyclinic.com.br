<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Bloquear Datas - Studio PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* RESET E BASE */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            background: linear-gradient(135deg,#0f172a,#1e293b);
            color: #fff;
        }

        /* SIDEBAR */
        .sidebar {
            width: 240px;
            height: 100vh;
            background: #111827;
            padding: 20px;
            position: fixed;
            display: flex;
            flex-direction: column;
        }

            .sidebar h2 {
                color: #22c55e;
                margin-bottom: 30px;
            }

            .sidebar a {
                display: block;
                padding: 12px;
                margin-bottom: 12px;
                border-radius: 10px;
                background: #1f2937;
                color: white;
                text-decoration: none;
                transition: 0.3s;
            }

                .sidebar a:hover {
                    background: #374151;
                    transform: translateX(5px);
                }

        /* CONTEÚDO PRINCIPAL */
        .content {
            margin-left: 260px;
            padding: 40px;
            flex: 1;
        }

        /* CARD */
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            transition: transform 0.3s ease;
        }

            .card:hover {
                transform: translateY(-5px);
            }

        h2 {
            color: #22c55e;
            margin-bottom: 25px;
            text-align: center;
        }

        /* FORMULÁRIO */
        form label {
            display: block;
            margin-top: 10px;
            margin-bottom: 5px;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.15);
            color: white;
            margin-bottom: 15px;
            transition: 0.3s;
        }

            input:focus {
                background: rgba(255,255,255,0.25);
                transform: scale(1.02);
            }

        button {
            background: linear-gradient(90deg,#22c55e,#16a34a);
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

            button:hover {
                transform: translateY(-2px);
                box-shadow: 0 10px 20px rgba(34,197,94,0.6);
            }

        hr {
            border: 0;
            border-top: 1px solid rgba(255,255,255,0.2);
            margin: 25px 0;
        }

        /* LISTA DE BLOQUEIOS */
        .item {
            background: rgba(255,255,255,0.08);
            padding: 12px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            transition: 0.3s;
        }

            .item:hover {
                background: rgba(255,255,255,0.15);
            }

        .delete {
            background: #ef4444;
            color: white;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            text-decoration: none;
            transition: 0.3s;
        }

            .delete:hover {
                background: #dc2626;
                transform: translateY(-1px);
            }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>💜 Studio PRO</h2>
        <a href="/dashboard">Dashboard</a>
        <a href="/admin/horarios">Horários</a>
        <a href="/admin/horarios-especiais">Horário por Período</a>
        <a href="/admin/bloqueios">Bloquear Datas</a>
    </div>

    <div class="content">
        <div class="card">
            <h2>Bloquear Datas</h2>

            <form method="POST" action="/admin/bloqueios/add">
                <label>Data</label>
                <input type="date" name="data" required>

                <label>Motivo</label>
                <input type="text" name="motivo">

                <button type="submit">💾 Bloquear</button>
            </form>

            <hr>

            <h3>Datas bloqueadas</h3>

            {% for b in bloqueios %}
            <div class="item">
                <span>
                    {{ b.data.strftime('%d/%m/%Y') }}
                    {% if b.motivo %}- {{ b.motivo }}{% endif %}
                </span>

                <a class="delete" href="/admin/bloqueios/excluir/{{ b.id }}">Excluir</a>
            </div>
            {% endfor %}
        </div>
    </div>

</body>
</html>
